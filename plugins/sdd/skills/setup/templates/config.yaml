# feature-spec project configuration
# Auto-generated by /setup on YYYY-MM-DD.
# One-time baseline snapshot — NOT auto-synced. Edit by hand or re-run /setup when it drifts.
# This is the SINGLE grounding source /propose, /apply, and /quick read before
# dispatching agents. They do not read any other project doc — what AI knows
# about this project's architecture is exactly what lives here.

# --- Baseline architecture ---------------------------------------------------
# The architecture floor AI uses to orient. Keep it pointer-form and stable.
# Edit it by hand when it drifts; it is the authoritative description, so make
# it accurate. Do NOT let it sprawl into a living map of every file.

tech_stack: ""          # one line, e.g. "Nuxt 4 / Vue 3 / TS · ASP.NET Core .NET 8 · EF Core"

architecture:
  pattern: ""           # e.g. "Clean Architecture (backend) + Atomic Design (frontend)"
  layers: []            # pointer form, e.g. ["domain → src/Domain/", "api → src/Api/"]
  entry_points: []      # where features get added, e.g. ["HTTP → src/Api/", "pages → app/pages/"]
  hard_rules: []        # structural invariants only, e.g. ["Endpoints never touch DbContext directly"]

# --- Tool-runnable -----------------------------------------------------------
# Lint/format commands to run before each commit (optional). Fix mode so
# auto-fixable issues are resolved. Agents run these in order before committing.
#   lint_commands:
#     - pnpm eslint --fix .
#     - dotnet format

# Verification commands to run after implementation (optional). Use the EXACT
# script name from package.json — never hardcode tool-specific flags.
#   verification_commands:
#     type_check: npm run type-check
#     unit_test: npm run test:unit
#     build: npm run build

# --- Per-artifact rules (optional) -------------------------------------------
# Custom rules for specific artifacts.
